# Sakshi — aggregation pipeline (supervised launch).
#
# Fetches ALREADY-PUBLIC judicial records + credible media, extracts and sanitizes
# (victim identity is NEVER ingested), deduplicates case-anchored records,
# validates + shards. sanitize + pii_guard are the enforcement.
#
# LAUNCH_MODE (repo variable, human-controlled):
#   staged (default): the run commits data/ to branch `data-staging` and opens/
#     updates a review PR to main. NOTHING publishes until a human merges the PR.
#   auto: commit straight to main; the Pages deploy follows.

name: scrape

on:
  # One STAGED run daily at 06:00 IST (00:30 UTC). LAUNCH_MODE stays 'staged', so
  # each run only opens/updates the data-review PR — nothing publishes without a
  # human merge. Counts toward the 2/day cap alongside manual workflow_dispatch.
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC == 06:00 IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Offline dry-run on TESTVILLE fixtures (no network, no Gemini, no commit)."
        type: boolean
        default: false
      states:
        description: "Comma-separated state codes to limit this run (e.g. TG,DL). Blank = repo var/all."
        type: string
        default: ''
      lookback_days:
        description: "Only keep cases reported within this many days. Blank = repo var/none."
        type: string
        default: ''

# Least privilege: commit data/ (to a branch), open the review PR, open issues.
# In LAUNCH_MODE=auto the run also self-certifies the two required checks and
# dispatches the deploy, so with the default GITHUB_TOKEN it additionally needs:
#   statuses: write — post the "Python checks (3.12)" / "Frontend checks" commit
#                     statuses on the PR head (the ruleset's required contexts);
#   actions:  write — `gh workflow run deploy.yml` (a GITHUB_TOKEN merge does not
#                     trigger deploy.yml's push event; workflow_dispatch does).
# These do not touch branch protection and are unused in staged mode.
permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write
  actions: write

# Never let two pipeline runs overlap.
concurrency:
  group: sakshi-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Data update
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      LAUNCH_MODE: ${{ vars.LAUNCH_MODE || 'staged' }}
      LAUNCH_STATES: ${{ github.event.inputs.states || vars.LAUNCH_STATES || '' }}
      LAUNCH_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || vars.LAUNCH_LOOKBACK_DAYS || '' }}
      # Supervised phase: when 'true', hold even auto-eligible records unless they are
      # on the approval allowlist, so nothing publishes without an explicit approval.
      PUBLISH_APPROVED_ONLY: ${{ vars.PUBLISH_APPROVED_ONLY || '' }}
      # Optional ops override of the pinned model chain (comma-separated). Empty =>
      # the pinned chain in sources.yml (extraction.models). No code change needed.
      GEMINI_MODELS: ${{ vars.GEMINI_MODELS || '' }}
      # Verifier (guardrail L). The pipeline reads VERIFY_ENABLED / VERIFY_MAX_USD
      # from the environment (pipeline/config.py). Set at job level so BOTH the
      # `Run pipeline` step and the `Post ops heartbeat` step (which prints a
      # verify line only when $VERIFY_ENABLED=true) observe the same value.
      VERIFY_ENABLED: ${{ vars.VERIFY_ENABLED || '' }}
      VERIFY_MAX_USD: ${{ vars.VERIFY_MAX_USD || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          # Persist SCRAPE_BOT_TOKEN (a PAT / GitHub App token) as the git credential
          # so the push to data-staging is attributed to a real actor and the
          # staged-review PR's CI runs automatically. A push made with the default
          # GITHUB_TOKEN cannot trigger another workflow (GitHub's recursion guard),
          # which is why that PR's checks otherwise park as "Action required".
          # Falls back to GITHUB_TOKEN until the secret is provisioned (current
          # behaviour: CI needs one manual approval per staged run).
          token: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.'

      # Restore the processed-document ledger from the dedicated UNPROTECTED
      # ledger-state branch, so coverage accounting persists across runs without
      # touching protected main. github-actions[bot] can read/write ledger-state.
      - name: Restore ledger from ledger-state
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/_meta
          REPO="${{ github.repository }}"
          # `.content // empty` yields "" (not the literal "null") when the branch/file
          # is absent, so a first run cleanly starts fresh.
          RAW="$(gh api "repos/$REPO/contents/data/_meta/processed.json?ref=ledger-state" --jq '.content // empty' 2>/dev/null || true)"
          if [ -n "$RAW" ] && echo "$RAW" | base64 -d > data/_meta/processed.json 2>/dev/null; then
            echo "restored ledger from ledger-state."
          else
            echo '{"version":1,"documents":{}}' > data/_meta/processed.json
            echo "no ledger-state yet; starting fresh."
          fi

      # Restore the PRIOR staged (not-yet-on-main) records from data-staging into a
      # side dir, so the pipeline folds them back into the tree even if their source
      # rolled off the feed or fails re-extraction — a force-push can never lose them.
      # Staged mode only (auto mode commits straight to main).
      - name: Restore staged carryover from data-staging
        if: env.DRY_RUN != 'true' && env.LAUNCH_MODE != 'auto'
        run: |
          STAGED="${RUNNER_TEMP}/staged"
          mkdir -p "$STAGED"
          if git ls-remote --exit-code --heads origin data-staging >/dev/null 2>&1; then
            git fetch --depth=1 origin data-staging
            git archive origin/data-staging data/ 2>/dev/null | tar -x -C "$STAGED" 2>/dev/null || true
            echo "staged carryover: $(find "$STAGED" -name '*.json' 2>/dev/null | wc -l) file(s)"
          else
            echo "no data-staging branch yet; no carryover."
          fi
          # The pipeline reads STAGED_DIR (its year-dir shards) as carryover records.
          echo "STAGED_DIR=$STAGED/data" >> "$GITHUB_ENV"

      # Fetch -> extract -> sanitize -> project -> scope -> dedupe -> validate &
      # shard -> pii_guard. Writes data/ + logs/run_report.md (the PR body).
      - name: Run pipeline
        id: run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "LAUNCH_MODE=$LAUNCH_MODE  STATES=${LAUNCH_STATES:-<all>}  LOOKBACK=${LAUNCH_LOOKBACK_DAYS:-<none>}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running OFFLINE dry-run (fixtures only; no network, no Gemini)."
            python -m pipeline --dry-run
          else
            python -m pipeline
          fi

      - name: Read run counters
        id: counts
        if: always()
        run: |
          NEW=0; UPDATED=0; REVIEW=0; PUBLISHED=0; COST=0
          [ -f logs/run_summary.env ] && . logs/run_summary.env
          for k in new:$NEW updated:$UPDATED review:$REVIEW published:$PUBLISHED; do
            echo "${k%%:*}=${k#*:}" >> "$GITHUB_OUTPUT"
          done

      # Independent gate BEFORE anything is committed (the pipeline also runs
      # pii_guard internally; this is the CI-visible belt-and-suspenders check).
      - name: Validate + PII guard
        if: success() && env.DRY_RUN != 'true'
        run: |
          python -m pipeline.validate --all
          python scripts/pii_guard.py data/

      # Persist the updated processed-document ledger to the dedicated UNPROTECTED
      # ledger-state branch (never merged; operational metadata only). No main-branch
      # bypass needed. Fenced three ways:
      #   (a) schema + no-URL validation of the ledger,
      #   (b) pii_guard over data/_meta,
      #   (c) the Contents API writes exactly ONE path, structurally incapable of
      #       touching anything but data/_meta/processed.json.
      # Ledger persistence is an OPTIMISATION (skip already-settled docs next run), not
      # data. continue-on-error so a persist hiccup can NEVER block the data staging
      # below — a missing persist just means the next run re-examines those docs.
      - name: Persist ledger to ledger-state
        if: success() && env.DRY_RUN != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          LEDGER=data/_meta/processed.json
          test -f "$LEDGER" || { echo "no ledger to persist"; exit 0; }
          python -m pipeline.validate --ledger "$LEDGER"     # (a) schema + no URL
          python scripts/pii_guard.py data/_meta/            # (b) PII gate
          REPO="${{ github.repository }}"
          if ! gh api "repos/$REPO/branches/ledger-state" >/dev/null 2>&1; then
            MAIN_SHA="$(gh api "repos/$REPO/git/refs/heads/main" --jq .object.sha)"
            gh api -X POST "repos/$REPO/git/refs" -f ref="refs/heads/ledger-state" -f sha="$MAIN_SHA" >/dev/null
            echo "created ledger-state branch."
          fi
          REMOTE="$(gh api "repos/$REPO/contents/$LEDGER?ref=ledger-state" --jq '.content // empty' 2>/dev/null | base64 -d 2>/dev/null || true)"
          if [ -n "$REMOTE" ] && [ "$REMOTE" = "$(cat "$LEDGER")" ]; then
            echo "ledger unchanged."; exit 0
          fi
          SHA="$(gh api "repos/$REPO/contents/$LEDGER?ref=ledger-state" --jq '.sha // empty' 2>/dev/null || true)"
          # Build the Contents API payload in a FILE. The ledger grows unboundedly, so
          # passing base64 on the command line hits ARG_MAX ("Argument list too long");
          # jq --rawfile reads it from a file and --input sends the JSON from a file.
          base64 -w0 "$LEDGER" > "$RUNNER_TEMP/ledger.b64"
          jq -n --rawfile c "$RUNNER_TEMP/ledger.b64" \
            --arg m "chore(ledger): update $(date +%F) run ${{ github.run_number }}" \
            --arg b ledger-state --arg s "${SHA:-}" \
            '{message:$m, content:($c|rtrimstr("\n")), branch:$b}
             + (if $s == "" then {} else {sha:$s} end)' > "$RUNNER_TEMP/ledger_payload.json"
          gh api -X PUT "repos/$REPO/contents/$LEDGER" --input "$RUNNER_TEMP/ledger_payload.json" >/dev/null
          echo "ledger persisted to ledger-state."

      # STAGED: push data/ to a review branch and open/update the PR. No publish.
      - name: Stage data for review
        if: success() && env.DRY_RUN != 'true' && env.LAUNCH_MODE != 'auto'
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "sakshi-bot"
          git config user.email "actions@users.noreply.github.com"
          DATE="$(date +%F)"; BRANCH="data-staging"
          git checkout -B "$BRANCH"
          git add data/
          # The ledger lives on the ledger-state branch, never in the review PR —
          # keep data/_meta out so the PR shows only reviewable case data.
          git reset -q -- data/_meta 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to stage — nothing to review."
            exit 0
          fi
          git commit -m "data: staged review $DATE (+${{ steps.counts.outputs.new }} new, ~${{ steps.counts.outputs.updated }} updated)"
          git push -f origin "$BRANCH"
          TITLE="Data review: $DATE"
          # Only an OPEN PR should be edited. `gh pr view` also matches a MERGED PR
          # for this branch, which would silently edit the old (merged) PR and never
          # open a fresh review PR after the first is merged.
          OPEN_PR="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$OPEN_PR" ]; then
            gh pr edit "$OPEN_PR" --title "$TITLE" --body-file logs/run_report.md
          else
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file logs/run_report.md \
              --label data-review 2>/dev/null \
            || gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file logs/run_report.md
          fi
          gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url'

      # ---------------------------------------------------------------------
      # AUTO (post-launch): publish to main WITHOUT a human and WITHOUT a PAT.
      #
      # main is protected by the `main-protection` ruleset: changes need a PR
      # with 0 required approvals and two SUCCESS status checks, by context
      # ("Python checks (3.12)", "Frontend checks", both integration_id:None so
      # a plain commit status with that exact context satisfies them).
      # github-actions[bot] is NOT a bypass actor, so a direct `git push` to
      # main is rejected — hence this PR-then-satisfy-the-checks path. Nothing
      # below weakens the ruleset; it satisfies it. sanitize + pii_guard already
      # ran inside the pipeline above, and the FULL `make check` re-runs the CI
      # gate on the staged tree below BEFORE any status is posted or merge made.
      #
      # If SCRAPE_BOT_TOKEN (a PAT/App token) is ever provisioned, this path
      # still works: the PAT's push to data-staging triggers the PR's real CI and
      # the merge triggers deploy.yml naturally — the statuses we post just
      # become redundant, and the explicit deploy dispatch a harmless no-op-ish
      # second run (Pages concurrency serialises it).
      # ---------------------------------------------------------------------

      # 1) Commit data/ (never data/_meta — the ledger lives on ledger-state) to
      #    the UNPROTECTED data-staging branch and open/update the PR to main.
      #    The bot CAN push here. No data change => publish + deploy are skipped
      #    entirely (changed=false), same as staged mode's no-op.
      - name: Publish (auto) — stage data and open the PR
        id: publish_stage
        if: success() && env.DRY_RUN != 'true' && env.LAUNCH_MODE == 'auto'
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "sakshi-bot"
          git config user.email "actions@users.noreply.github.com"
          DATE="$(date +%F)"; BRANCH="data-staging"
          git checkout -B "$BRANCH"
          git add data/
          # The ledger is never part of the published tree — keep data/_meta out.
          git reset -q -- data/_meta 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to publish — skipping checks, merge, and deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "data: daily update $DATE (+${{ steps.counts.outputs.new }} new, ~${{ steps.counts.outputs.updated }} updated)"
          git push -f origin "$BRANCH"
          TITLE="Data auto-publish: $DATE"
          # Only ever edit an OPEN PR — a MERGED PR for this branch must not be
          # reused, or we'd silently re-edit yesterday's merged PR.
          OPEN_PR="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          if [ -n "$OPEN_PR" ]; then
            gh pr edit "$OPEN_PR" --title "$TITLE" --body-file logs/run_report.md
            PR="$OPEN_PR"
          else
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file logs/run_report.md \
              --label data-review 2>/dev/null \
            || gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file logs/run_report.md
            PR="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')"
          fi
          echo "changed=true"   >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR"  >> "$GITHUB_OUTPUT"
          echo "PR #$PR: $(gh pr view "$PR" --json url --jq .url)"

      # 2) Node toolchain for the frontend half of `make check` (eslint/prettier).
      #    Skips automatically in staged mode / when there is nothing to publish.
      - name: Set up Node.js for the publish gate
        if: success() && env.LAUNCH_MODE == 'auto' && steps.publish_stage.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # 3) Re-run the FULL CI gate on the EXACT tree we staged, so publication is
      #    genuinely conditional on the same checks ci.yml enforces. If this
      #    FAILS we do NOT publish: the job exits non-zero and the PR is left
      #    OPEN for a human. `PY=python` points the Makefile at the job's
      #    interpreter instead of its default .venv; the override propagates to
      #    the recursive `$(MAKE) validate` / `pii-guard` sub-invocations too.
      #    (pii-guard here also scans the restored data/_meta ledger — stricter
      #    than ci.yml, where main carries no _meta; it passes because the ledger
      #    is PII/URL-free by construction, and would fail-closed otherwise.)
      - name: Gate — full `make check` on the staged tree
        id: gate
        if: success() && env.LAUNCH_MODE == 'auto' && steps.publish_stage.outputs.changed == 'true'
        run: |
          python -m pip install -e '.[dev]'
          ( cd site && npm ci --no-audit --no-fund )
          if ! make check PY=python; then
            echo "::error::make check FAILED on the staged tree — NOT publishing. PR #${{ steps.publish_stage.outputs.pr_number }} left open for a human."
            exit 1
          fi
          echo "make check passed on the staged tree — safe to certify + merge."

      # 4) Certify the two required contexts on the PR head SHA (legitimate — the
      #    same checks just passed in-job), poll until GitHub reports the PR
      #    mergeable, then merge (NOT --admin, NOT a bypass: the ruleset is
      #    satisfied by PR + 0 approvals + 2 successes). Finally dispatch the
      #    Pages deploy — a GITHUB_TOKEN merge does NOT trigger deploy.yml's push
      #    event (recursion guard), but workflow_dispatch is the documented
      #    exception that DOES fire even from GITHUB_TOKEN.
      - name: Publish — certify checks, merge, deploy
        if: success() && env.LAUNCH_MODE == 'auto' && steps.publish_stage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          PR="${{ steps.publish_stage.outputs.pr_number }}"
          RUN_URL="${{ github.server_url }}/$REPO/actions/runs/${{ github.run_id }}"
          # Authoritative head SHA the ruleset evaluates its required contexts on.
          SHA="$(gh pr view "$PR" --json headRefOid --jq .headRefOid)"
          for CTX in "Python checks (3.12)" "Frontend checks"; do
            gh api -X POST "repos/$REPO/statuses/$SHA" \
              -f state=success \
              -f context="$CTX" \
              -f description="Passed in the scrape run's in-job make check." \
              -f target_url="$RUN_URL" >/dev/null
            echo "posted success status: '$CTX' @ $SHA"
          done
          # Give GitHub a moment to recompute mergeability now the contexts are
          # green. Bounded to ~90s, then attempt the merge regardless.
          MERGE_OK=""
          for i in $(seq 1 18); do
            STATE="$(gh pr view "$PR" --json mergeStateStatus --jq .mergeStateStatus 2>/dev/null || echo UNKNOWN)"
            echo "mergeStateStatus=$STATE (attempt $i/18)"
            if [ "$STATE" = "CLEAN" ]; then MERGE_OK=1; break; fi
            sleep 5
          done
          if [ -z "$MERGE_OK" ]; then
            echo "::warning::mergeStateStatus not CLEAN after ~90s; attempting merge anyway."
          fi
          # Keep data-staging (force-pushed next run); do NOT --admin.
          gh pr merge "$PR" --squash --delete-branch=false
          echo "merged PR #$PR into main."
          # The GITHUB_TOKEN merge will not trigger deploy.yml's push event, so
          # dispatch it explicitly (workflow_dispatch fires even from GITHUB_TOKEN).
          gh workflow run deploy.yml --ref main
          echo "dispatched deploy.yml on main."

      # Run logs + the review quarantine (both sanitized) for human inspection.
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: |
            logs/
            data/_review/
          retention-days: 14
          if-no-files-found: warn

      # Daily heartbeat: ONE comment per run on the ops-log issue (vars.OPS_ISSUE),
      # empty runs included. A missing comment on a cron day is itself the alert
      # (the cron did not fire). Fixed format; no PII (counts + a run URL only).
      - name: Post ops heartbeat
        if: always() && env.DRY_RUN != 'true' && vars.OPS_ISSUE != ''
        env:
          GH_TOKEN: ${{ secrets.SCRAPE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          NEW=0; UPDATED=0; REVIEW=0; PUBLISHED=0; NEEDS_REVIEW=0; REJECTED=0; COST=0
          FETCHED=0; PROCESSED=0; SKIPPED=0; EXTRACTED=0
          VERIFIED=0; VERIFY_DEMOTED=0; VERIFY_COST=0
          [ -f logs/run_summary.env ] && . logs/run_summary.env
          # Depth of the persistent needs-review (held) queue, straight from the file.
          QUEUE="$(jq 'length' data/_needs_review/queue.json 2>/dev/null || echo 0)"
          LG=data/_meta/processed.json
          LEDGER_TOTAL="$(jq '.documents | length' "$LG" 2>/dev/null || echo 0)"
          # Only terminal (settled) outcomes count as "settled" — not staged_pending/failed.
          LEDGER="$(jq '[.documents[]|select(.outcome|IN("published","rejected","out_of_scope","out_of_window","not_a_case"))]|length' "$LG" 2>/dev/null || echo 0)"
          PENDING="$(jq '[.documents[]|select(.outcome=="staged_pending")]|length' "$LG" 2>/dev/null || echo 0)"
          STATUS="ok"; ERRS=""
          if [ -f logs/gemini_cost.json ]; then
            TRUNC="$(jq -r '.truncated_reason // empty' logs/gemini_cost.json)"
            [ -n "$TRUNC" ] && STATUS="truncated:$TRUNC"
            [ "$(jq -r '.aborted' logs/gemini_cost.json)" = "true" ] && STATUS="aborted"
            ERRS="$(jq -r '(.error_samples // []) | join(" | ")' logs/gemini_cost.json | cut -c1-200)"
          fi
          [ "${{ job.status }}" = "failure" ] && STATUS="RUN FAILED"
          INSCOPE=$((PUBLISHED + NEEDS_REVIEW + REVIEW))
          SCOPE="states=${LAUNCH_STATES:-<UNSET!>} · lookback=${LAUNCH_LOOKBACK_DAYS:-<none>}d"
          # Verifier line (guardrail L) — shown only when the verifier ran this cycle.
          VLINE=""
          if [ "${VERIFY_ENABLED:-}" = "true" ] || [ "${VERIFIED:-0}" != "0" ] || [ "${VERIFY_DEMOTED:-0}" != "0" ]; then
            VLINE="$(printf '\n- verify (guardrail L): **%s** verified · %s demoted/quarantined · est $%s' "$VERIFIED" "$VERIFY_DEMOTED" "$VERIFY_COST")"
          fi
          # Flag a growing human-review backlog (held records awaiting promotion).
          QNOTE=""; [ "${QUEUE:-0}" -gt 25 ] && QNOTE=" ⚠️ over 25"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="$(printf '**%s** · [run](%s) · trigger: %s\n- scope: %s\n- docs: fetched **%s** · processed %s (skipped %s settled) · ledger %s settled / %s pending / %s total\n- extract: %s extracted · %s in-scope · **%s** auto-published · **%s** held · %s quarantined · %s out-of-scope%s\n- needs-review queue: **%s**%s\n- cost: $%s · status: **%s**%s' \
            "$(date +%F)" "$URL" "${{ github.event_name }}" "$SCOPE" \
            "$FETCHED" "$PROCESSED" "$SKIPPED" "$LEDGER" "$PENDING" "$LEDGER_TOTAL" \
            "$EXTRACTED" "$INSCOPE" "$PUBLISHED" "$NEEDS_REVIEW" "$REVIEW" "$REJECTED" "$VLINE" \
            "$QUEUE" "$QNOTE" \
            "$COST" "$STATUS" "${ERRS:+ · errors: $ERRS}")"
          gh issue comment "${{ vars.OPS_ISSUE }}" --body "$BODY"

      - name: Open issue on failure or large review queue
        if: always() && (failure() || fromJSON(steps.counts.outputs.review || '0') > 20)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(date +%F)"
          if [ "${{ job.status }}" = "failure" ]; then
            TITLE="Pipeline run failed — ${DATE}"
            BODY="The pipeline failed on ${DATE}. See the run logs artifact and the [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          else
            TITLE="Review queue over threshold — ${DATE}"
            BODY="The review queue holds ${{ steps.counts.outputs.review }} records (threshold 20) on ${DATE}, quarantined in data/_review/."
          fi
          gh issue create --title "$TITLE" --body "$BODY" --label "pipeline" || \
            echo "Could not open issue (label may be missing); continuing."
