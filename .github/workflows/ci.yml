# Sakshi — continuous integration.
#
# Runs the `make check` gates on every pull request and on push to main:
# ruff, mypy --strict, pytest (coverage gate; 100% on sanitize/pii_guard),
# jsonschema validation of every shard, pii_guard, summary-size assertion,
# and the frontend lint/format checks (eslint, prettier).
#
# A pii_guard hit fails the build. That gate is non-negotiable.

name: ci

on:
  pull_request:
  push:
    branches: [main]

# Read-only: CI validates, it never writes back.
permissions:
  contents: read

# Coalesce redundant runs on the same ref; cancel superseded ones.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Single supported interpreter — keep the matrix minimal.
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check pipeline scripts

      - name: Format check (ruff)
        run: ruff format --check pipeline scripts

      - name: Type check (mypy --strict)
        run: mypy

      # Coverage gate: >= 85% pipeline overall.
      - name: Tests with coverage
        run: pytest --cov=pipeline --cov-fail-under=85 --cov-report=term-missing

      # The safety-critical sanitize.py and pii_guard.py are held to 100%.
      - name: PII gate coverage (100%)
        run: |
          pytest \
            --cov=pipeline.sanitize --cov=scripts.pii_guard \
            --cov-fail-under=100 --cov-report=term-missing \
            pipeline/tests/test_sanitize.py pipeline/tests/test_pii_guard.py

      # Validate every published shard against schemas/case.schema.json and
      # confirm summary.json stays under the 50 KB budget.
      - name: Validate shards and summary size
        run: python -m pipeline.validate --all

      # Final safety assertion. Any forbidden field name or PII-shaped value
      # anywhere under data/ fails the build.
      - name: PII guard
        run: python scripts/pii_guard.py data/

      # Prove the whole pipeline runs offline on TESTVILLE fixtures — no network,
      # no Gemini key — before any real scrape is ever trusted.
      - name: Pipeline dry-run (offline)
        run: python -m pipeline --dry-run

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No committed lockfile yet, so use `npm install` (not `npm ci`).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check
